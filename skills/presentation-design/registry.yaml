# Presentation Design Skill — Registry
# -----------------------------------------------------------------
# ALWAYS load this file first — before any card or layout spec file.
# Keep descriptions ≤ 20 words. Add new entries when introducing
# new cards, layouts, or scripts.
# -----------------------------------------------------------------

version: 1

cards:
  - id: text-card
    description: General-purpose text card with heading, body text, and typography variants.
    file: cards/text/text-card.md
    tags: [text, content, heading, body, paragraph, bullets, typography]

  - id: image-card
    description: Card displaying an image in full-bleed, framed, or circular presentation mode.
    file: cards/media/image-card.md
    tags: [image, photo, media, illustration, visual, picture]

  - id: kpi-card
    description: Key performance indicator card with large metric value, trend, and label.
    file: cards/data/kpi-card.md
    tags: [kpi, metric, number, value, trend, data, performance]

  - id: chart-card
    description: Chart card supporting bar, pie, and line chart types from structured data.
    file: cards/data/chart-card.md
    tags: [chart, data, bar, pie, line, visualization, analytics]

  - id: table-card
    description: Data table card with themed header row, optional sum row, and alternating row stripe.
    file: cards/data/table-card.md
    tags: [table, data, rows, columns, grid, sum, totals, comparison, financials, kpi]

  - id: quote-card
    description: Styled quotation card with quote text, attribution, and optional image.
    file: cards/structural/quote-card.md
    tags: [quote, testimonial, citation, attribution, text]

  - id: agenda-card
    description: Auto-generated agenda entry list with active-section highlighting.
    file: cards/structural/agenda-card.md
    tags: [agenda, navigation, sections, overview, contents, schedule]

  - id: stacked-text-card
    description: 2–4 equal-height text blocks with h2 heading and body text; dividers align across cards.
    file: cards/text/stacked-text-card.md
    tags: [text, stacked, blocks, heading, body, list, steps, comparison, process]

  - id: icon_item_text
    description: 1–5 heading/body items with optional left/right icons or labels.
    file: cards/text/icon_item_text.md
    tags: [text, icon, items, heading, body, list, label]

  - id: gantt-chart-card
    description: Gantt chart card with task bars, phase grouping, and date axis.
    file: cards/data/gantt-chart-card.md
    tags: [gantt, timeline, schedule, tasks, phases, planning, roadmap, dates]

  - id: numbered-text-card
    description: Numbered list card with auto-incrementing step numbers and body text.
    file: cards/text/numbered_text_card.md
    tags: [numbered, steps, list, sequence, process, ordered, text]

  - id: timeline-card
    description: Horizontal or vertical timeline card with dated milestones and labels.
    file: cards/structural/timeline-card.md
    tags: [timeline, milestones, dates, events, history, roadmap, progress]

  - id: scope-card
    description: In-scope / out-of-scope two-column card for project boundary definition.
    file: cards/structural/scope-card.md
    tags: [scope, in-scope, out-of-scope, boundaries, project, requirements]

  - id: compare-card
    description: Side-by-side comparison card with labeled columns and row items.
    file: cards/structural/compare-card.md
    tags: [comparison, versus, pros-cons, options, alternatives, table]

  - id: heatmap-card
    description: Color-coded heatmap grid card for risk, priority, or density visualization.
    file: cards/structural/heatmap-card.md
    tags: [heatmap, grid, risk, priority, matrix, color, density]

  - id: callout-card
    description: Consulting-style "key insight" box with accent bar, eyebrow label, and large takeaway.
    file: cards/structural/callout-card.md
    tags: [callout, insight, takeaway, key, highlight, executive, summary, hero]

  - id: stat-grid-card
    description: Multi-metric "by the numbers" card showing 2–6 large statistic tiles in one slot.
    file: cards/data/stat-grid-card.md
    tags: [stats, numbers, metrics, dashboard, overview, executive, kpi-grid, hero]

  - id: section-divider-card
    description: Bold full-bleed chapter break with oversized section number and title. Use between sections.
    file: cards/structural/section-divider-card.md
    tags: [section, divider, chapter, break, intermission, transition, hero]

  - id: quadrant-card
    description: 2×2 matrix card for SWOT, BCG matrix, prioritisation grid, Eisenhower box. Optional axis labels.
    file: cards/structural/quadrant-card.md
    tags: [quadrant, matrix, swot, 2x2, prioritisation, eisenhower, framework, strategy]

  - id: process-flow-card
    description: Horizontal process flow with N right-pointing chevron steps. Use for project phases, methodologies, customer journeys.
    file: cards/structural/process-flow-card.md
    tags: [process, flow, chevron, phases, methodology, journey, steps, sequential]

  - id: pyramid-card
    description: Hierarchical pyramid (stacked trapezoid layers) for strategic hierarchy, Maslow, value pyramid. Optional side labels.
    file: cards/structural/pyramid-card.md
    tags: [pyramid, hierarchy, maslow, strategy, layers, levels, value-pyramid]

  - id: step-card
    description: Diagonal stair of 3-5 steps with circle (icon) + heading + body. Visualises maturity, journey, or progressive build-up.
    file: cards/structural/step-card.md
    tags: [steps, stair, journey, maturity, progression, methodology, icons]

  - id: gauge-card
    description: Row of 2-5 donut gauges showing percentages with heading and optional body. KPI dashboard pattern.
    file: cards/structural/gauge-card.md
    tags: [gauge, donut, kpi, dashboard, percentage, metric, score]

  - id: circular-infographic-card
    description: Concentric inner+outer ring infographic with N coloured segments per ring; optional highlighted segment bumps outward.
    file: cards/structural/circular-infographic-card.md
    tags: [circular, ring, donut, wheel, infographic, segments, framework, capability-wheel]

  - id: calendar-card
    description: Row of N month grids (Mon-Sun) with date-range highlight pills in arbitrary colours and an optional legend. Project schedules, sprint plans, holiday calendars.
    file: cards/structural/calendar-card.md
    tags: [calendar, schedule, dates, months, plan, gantt-lite, project-phases, legend]

  - id: workpackage-timeline-card
    description: Project-phase timeline with N workpackages above a gradient bar (PT count + calendar week per WP) and M cross-workpackages spanning the full width below.
    file: cards/structural/workpackage-timeline-card.md
    tags: [timeline, workpackage, phase, project-plan, kickoff, person-days, calendar-week, gradient, cross-workpackage]

layouts:
  - id: title-slide
    description: Full-width title slide with centered heading, subtitle, and optional background.
    file: layouts/title-slide.md
    tags: [title, cover, hero, opening, intro]

  - id: grid-1x1
    description: Single card centered in the body area below the title bar.
    file: layouts/grid-1x1.md
    tags: [single, focus, centered, one-card]

  - id: grid-1x2
    description: Two cards side by side in a single row.
    file: layouts/grid-1x2.md
    tags: [two, comparison, side-by-side, dual]

  - id: grid-1x3
    description: Three cards in a single row.
    file: layouts/grid-1x3.md
    tags: [three, trio, row, horizontal]

  - id: grid-1x4
    description: Four cards in a single row.
    file: layouts/grid-1x4.md
    tags: [four, quad, row, compact]

  - id: grid-2x1
    description: Two cards stacked vertically in a single column.
    file: layouts/grid-2x1.md
    tags: [two, stacked, vertical, column]

  - id: grid-2x2
    description: Four cards in a 2×2 grid.
    file: layouts/grid-2x2.md
    tags: [four, grid, quadrant, balanced]

  - id: grid-2x3
    description: Six cards in a 2×3 grid (two rows, three columns).
    file: layouts/grid-2x3.md
    tags: [six, grid, matrix, dense]

  - id: grid-2x4
    description: Eight cards in a 2×4 grid (two rows, four columns).
    file: layouts/grid-2x4.md
    tags: [eight, grid, compact, dense]

  - id: grid-3x1
    description: Three cards stacked vertically in a single column.
    file: layouts/grid-3x1.md
    tags: [three, stacked, vertical, column]

  - id: grid-3x2
    description: Six cards in a 3×2 grid (three rows, two columns).
    file: layouts/grid-3x2.md
    tags: [six, grid, tall, vertical-heavy]

  - id: grid-3x3
    description: Nine cards in a 3×3 grid.
    file: layouts/grid-3x3.md
    tags: [nine, grid, dense, matrix]

  - id: grid-3x4
    description: Twelve cards in a 3×4 grid — maximum density layout.
    file: layouts/grid-3x4.md
    tags: [twelve, grid, maximum, dense, compact]

scripts:
  - id: build_presentation
    description: Main build script — parses deck, applies theme, renders slides.
    file: scripts/build_presentation.py

  - id: scaffold_presentation
    description: Scaffolds a new presentation project folder with all required files.
    file: scripts/scaffold_presentation.py

  - id: extract_theme
    description: (Future) Extracts design tokens from an existing PPTX or website.
    file: scripts/extract_theme.py

  - id: sync_numbering
    description: Pre-build step — resolves and renumbers %%-based placeholders in the deck.
    file: scripts/sync_numbering.py

references:
  - id: deck-syntax
    description: Structured Markdown syntax for presentation definitions.
    file: references/deck-syntax.md

  - id: token-reference
    description: Complete CSS token catalogue with namespaces and defaults.
    file: references/token-reference.md

  - id: setup
    description: Environment setup guide — venv, dependencies, first run.
    file: references/setup.md

  - id: architecture
    description: System architecture — pipeline, modules, data flow.
    file: references/architecture.md

  - id: inheritance-model
    description: Python class and CSS class inheritance model.
    file: references/inheritance-model.md
