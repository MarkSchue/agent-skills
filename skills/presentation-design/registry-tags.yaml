# Registry Tags — keyword aliases for registry lookup
# Use these tags to find cards/layouts by domain or intent
# without loading the full spec files.

card-tags:
  text:        [text-card]
  content:     [text-card, quote-card]
  heading:     [text-card]
  body:        [text-card]
  paragraph:   [text-card]
  bullets:     [text-card]
  image:       [image-card]
  photo:       [image-card]
  media:       [image-card]
  visual:      [image-card]
  kpi:         [kpi-card]
  metric:      [kpi-card]
  number:      [kpi-card]
  trend:       [kpi-card]
  performance: [kpi-card]
  chart:       [chart-card]
  bar:         [chart-card]
  pie:         [chart-card]
  line:        [chart-card]
  data:        [kpi-card, chart-card]
  analytics:   [chart-card]
  quote:       [quote-card]
  testimonial: [quote-card]
  citation:    [quote-card]
  agenda:      [agenda-card]
  navigation:  [agenda-card]
  sections:    [agenda-card]
  overview:    [agenda-card]
  schedule:    [agenda-card]

layout-tags:
  title:       [title-slide]
  cover:       [title-slide]
  hero:        [title-slide]
  opening:     [title-slide]
  single:      [grid-1x1]
  focus:       [grid-1x1]
  comparison:  [grid-1x2, grid-2x2]
  side-by-side: [grid-1x2]
  dual:        [grid-1x2]
  trio:        [grid-1x3, grid-3x1]
  grid:        [grid-2x2, grid-2x3, grid-3x2, grid-3x3, grid-3x4]
  quadrant:    [grid-2x2]
  stacked:     [grid-2x1, grid-3x1]
  dense:       [grid-2x3, grid-2x4, grid-3x3, grid-3x4]
  matrix:      [grid-2x3, grid-3x3]
  compact:     [grid-1x4, grid-2x4, grid-3x4]
  maximum:     [grid-3x4]
