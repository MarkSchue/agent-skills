# Material Design 3 — Dark Theme Design Config
# ─────────────────────────────────────────────────────────────────────────────
# System:  Google Material Design 3 (Material You)
# Theme:   Baseline Purple — Dark
# Source:  https://m3.material.io/styles/color/system/overview
# ─────────────────────────────────────────────────────────────────────────────

canvas:
  aspect-ratio: "16:9"
  width:  1920
  height: 1080
  margin: 80
  padding: 20
  gutter: 24
  baseline-grid: 4

platform: pptx              # Change to: drawio | pptx

preset: material

colors:
  # ── Primary Accent ──────────────────────────────────────
  primary:                    "#d0bcff"
  on-primary:                 "#381e72"
  primary-container:          "#4f378b"
  on-primary-container:       "#eaddff"

  # ── Secondary Accent ────────────────────────────────────
  secondary:                  "#cbc2db"
  on-secondary:               "#332d41"
  secondary-container:        "#4a4458"
  on-secondary-container:     "#e8def8"

  # ── Tertiary Accent ─────────────────────────────────────
  tertiary:                   "#efb8c8"
  on-tertiary:                "#492532"
  tertiary-container:         "#633b48"
  on-tertiary-container:      "#ffd8e4"

  # ── Error ───────────────────────────────────────────────
  error:                      "#f2b8b5"
  on-error:                   "#601410"
  error-container:            "#8c1d18"
  on-error-container:         "#f9dedc"

  # ── Surface ─────────────────────────────────────────────
  surface:                    "#1c1b1f"
  on-surface:                 "#e6e1e5"
  on-surface-variant:         "#cac4d0"
  surface-variant:            "#49454f"
  surface-container-lowest:   "#0f0d13"
  surface-container-low:      "#1d1b20"
  surface-container:          "#211f26"
  surface-container-high:     "#2b2930"
  surface-container-highest:  "#36343b"

  # ── Outline ─────────────────────────────────────────────
  outline:                    "#938f99"
  outline-variant:            "#49454f"

  # ── Utility aliases ─────────────────────────────────────
  neutral:                    "#938f99"
  border-subtle:              "#49454f"
  inverse-surface:            "#e6e1e5"
  inverse-on-surface:         "#313033"
  inverse-primary:            "#6750a4"
  scrim:                      "#000000"
  shadow:                     "#000000"

  # ── Semantic Colors ──────────────────────────────────────
  warning:                    "#ffb951"
  success:                    "#6dd58c"
  on-success:                 "#003919"

borders:
  radius-sharp:   4
  radius-medium:  12
  radius-large:   28

typography:
  font-family: "Roboto"
  heading-display:
    size: 57
    weight: 400
    line-height: 1.12
  heading:
    size: 32
    weight: 400
    line-height: 1.25
  heading-sub:
    size: 24
    weight: 400
    line-height: 1.33
  body:
    size: 16
    weight: 400
    line-height: 1.5
  label:
    size: 14
    weight: 500
    line-height: 1.43
  caption:
    size: 12
    weight: 400
    line-height: 1.33
  annotation:
    size: 11
    weight: 500
    line-height: 1.45

spacing:
  xs:   4
  s:    8
  m:   16
  l:   24
  xl:  48

elevation:
  none:   {blur: 0,  distance: 0,  opacity: 0}
  low:    {blur: 2,  distance: 1,  angle: 90, opacity: 0.10}
  medium: {blur: 6,  distance: 2,  angle: 90, opacity: 0.15}
  high:   {blur: 12, distance: 4,  angle: 90, opacity: 0.20}
