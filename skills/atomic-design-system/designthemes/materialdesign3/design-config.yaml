# Material Design 3 — Light Theme Design Config
# ─────────────────────────────────────────────────────────────────────────────
# System:  Google Material Design 3 (Material You)
# Theme:   Baseline Purple — Light
# Source:  https://m3.material.io/styles/color/system/overview
# ─────────────────────────────────────────────────────────────────────────────

canvas:
  aspect-ratio: "16:9"
  width:  1920
  height: 1080
  margin: 80
  padding: 20
  gutter: 24
  baseline-grid: 4          # M3 uses 4dp base grid (not 8dp like Material 2)

platform: pptx              # Change to: drawio | pptx

preset: material

colors:
  # ── Primary Accent ──────────────────────────────────────
  primary:                    "#6750a4"
  on-primary:                 "#ffffff"
  primary-container:          "#eaddff"
  on-primary-container:       "#21005d"

  # ── Secondary Accent ────────────────────────────────────
  secondary:                  "#625b71"
  on-secondary:               "#ffffff"
  secondary-container:        "#e8def8"
  on-secondary-container:     "#1d192b"

  # ── Tertiary Accent ─────────────────────────────────────
  tertiary:                   "#7d5260"
  on-tertiary:                "#ffffff"
  tertiary-container:         "#ffd8e4"
  on-tertiary-container:      "#31111d"

  # ── Error ───────────────────────────────────────────────
  error:                      "#b3261e"
  on-error:                   "#ffffff"
  error-container:            "#f9dedc"
  on-error-container:         "#410e0b"

  # ── Surface ─────────────────────────────────────────────
  surface:                    "#fffbfe"
  on-surface:                 "#1c1b1f"
  on-surface-variant:         "#49454f"
  surface-variant:            "#e7e0ec"
  surface-container-lowest:   "#ffffff"
  surface-container-low:      "#f7f2fa"
  surface-container:          "#f3edf7"
  surface-container-high:     "#ece6f0"
  surface-container-highest:  "#e6e0e9"

  # ── Outline ─────────────────────────────────────────────
  outline:                    "#79747e"
  outline-variant:            "#cac4d0"   # alias: border-subtle

  # ── Utility aliases for atomic system tokens ─────────────
  neutral:                    "#79747e"   # maps to: outline
  border-subtle:              "#cac4d0"   # maps to: outline-variant
  inverse-surface:            "#313033"
  inverse-on-surface:         "#f4eff4"
  inverse-primary:            "#d0bcff"
  scrim:                      "#000000"
  shadow:                     "#000000"

  # ── Semantic Colors (informal — use sparingly) ───────────
  warning:                    "#e6ac00"
  success:                    "#146c2e"
  on-success:                 "#ffffff"

borders:
  radius-sharp:   4           # shape.extra-small
  radius-medium:  12          # shape.medium
  radius-large:   28          # shape.extra-large

typography:
  font-family: "Roboto"
  heading-display:
    size: 57
    weight: 400
    line-height: 1.12
  heading:
    size: 32
    weight: 400
    line-height: 1.25
  heading-sub:
    size: 24
    weight: 400
    line-height: 1.33
  body:
    size: 16
    weight: 400
    line-height: 1.5
  label:
    size: 14
    weight: 500
    line-height: 1.43
  caption:
    size: 12
    weight: 400
    line-height: 1.33
  annotation:
    size: 11
    weight: 500
    line-height: 1.45

spacing:
  xs:   4
  s:    8
  m:   16
  l:   24
  xl:  48

elevation:
  none:   {blur: 0,  distance: 0,  opacity: 0}
  low:    {blur: 2,  distance: 1,  angle: 90, opacity: 0.08}
  medium: {blur: 6,  distance: 2,  angle: 90, opacity: 0.12}
  high:   {blur: 12, distance: 4,  angle: 90, opacity: 0.16}
