# Material Design 3 — Complete Design Tokens
# Source: https://m3.material.io/
# Version: M3 / Material You 2024
# ─────────────────────────────────────────────────────────────────────────────

# ╔══════════════════════════════════════════════════════════╗
# ║  COLOR ROLES — BASELINE LIGHT THEME (Purple)            ║
# ║  Generated by Material Theme Builder                    ║
# ║  Source hue: Purple — md.ref.palette.primary40 #6750a4  ║
# ╚══════════════════════════════════════════════════════════╝

color:
  light:
    # ── Accent: Primary ─────────────────────────────────────
    primary:                    "#6750a4"   # High-emphasis fills, text, icons on surface
    on-primary:                 "#ffffff"   # Text/icons against primary
    primary-container:          "#eaddff"   # Fill for key components (FAB, active state)
    on-primary-container:       "#21005d"   # Text/icons against primary-container

    # ── Accent: Secondary ───────────────────────────────────
    secondary:                  "#625b71"   # Less prominent fills, text, icons
    on-secondary:               "#ffffff"   # Text/icons against secondary
    secondary-container:        "#e8def8"   # Recessive fill (tonal buttons, filter chips)
    on-secondary-container:     "#1d192b"   # Text/icons against secondary-container

    # ── Accent: Tertiary ────────────────────────────────────
    tertiary:                   "#7d5260"   # Complementary accent fill
    on-tertiary:                "#ffffff"   # Text/icons against tertiary
    tertiary-container:         "#ffd8e4"   # Complementary container fill
    on-tertiary-container:      "#31111d"   # Text/icons against tertiary-container

    # ── Error ───────────────────────────────────────────────
    error:                      "#b3261e"   # Attention-grabbing error fill/text/icons
    on-error:                   "#ffffff"   # Text/icons against error
    error-container:            "#f9dedc"   # Error container fill
    on-error-container:         "#410e0b"   # Text/icons against error-container

    # ── Surface ─────────────────────────────────────────────
    surface:                    "#fffbfe"   # Default background
    on-surface:                 "#1c1b1f"   # Text/icons on any surface
    on-surface-variant:         "#49454f"   # Lower-emphasis text/icons on surface
    surface-variant:            "#e7e0ec"   # Alternative surface fill
    surface-container-lowest:   "#ffffff"   # Lowest-emphasis container
    surface-container-low:      "#f7f2fa"   # Low-emphasis container (elevation 1)
    surface-container:          "#f3edf7"   # Default container (elevation 2)
    surface-container-high:     "#ece6f0"   # High-emphasis container (elevation 3)
    surface-container-highest:  "#e6e0e9"   # Highest-emphasis container (elevation 4-5)
    surface-dim:                "#ded8e1"   # Dimmest surface (stays dim across themes)
    surface-bright:             "#fffbfe"   # Brightest surface (stays bright across themes)

    # ── Outline ─────────────────────────────────────────────
    outline:                    "#79747e"   # Important borders (text field, interactive)
    outline-variant:            "#cac4d0"   # Decorative borders (dividers)

    # ── Utility ─────────────────────────────────────────────
    scrim:                      "#000000"   # Modal backdrop / screen overlay
    shadow:                     "#000000"   # Drop shadow color
    inverse-surface:            "#313033"   # Background for inverse components (snackbar)
    inverse-on-surface:         "#f4eff4"   # Text/icons on inverse-surface
    inverse-primary:            "#d0bcff"   # Actionable text on inverse surface

    # ── Fixed Accent (theme-independent — same light & dark) ─
    primary-fixed:              "#eaddff"   # Fixed fill (same across themes)
    primary-fixed-dim:          "#d0bcff"   # Deeper fixed fill
    on-primary-fixed:           "#21005d"   # Text on fixed primary
    on-primary-fixed-variant:   "#4f378b"   # Lower-emphasis text on fixed primary
    secondary-fixed:            "#e8def8"
    secondary-fixed-dim:        "#cbc2db"
    on-secondary-fixed:         "#1d192b"
    on-secondary-fixed-variant: "#4a4458"
    tertiary-fixed:             "#ffd8e4"
    tertiary-fixed-dim:         "#efb8c8"
    on-tertiary-fixed:          "#31111d"
    on-tertiary-fixed-variant:  "#633b48"

  dark:
    # ── Accent: Primary ─────────────────────────────────────
    primary:                    "#d0bcff"
    on-primary:                 "#381e72"
    primary-container:          "#4f378b"
    on-primary-container:       "#eaddff"

    # ── Accent: Secondary ───────────────────────────────────
    secondary:                  "#cbc2db"
    on-secondary:               "#332d41"
    secondary-container:        "#4a4458"
    on-secondary-container:     "#e8def8"

    # ── Accent: Tertiary ────────────────────────────────────
    tertiary:                   "#efb8c8"
    on-tertiary:                "#492532"
    tertiary-container:         "#633b48"
    on-tertiary-container:      "#ffd8e4"

    # ── Error ───────────────────────────────────────────────
    error:                      "#f2b8b5"
    on-error:                   "#601410"
    error-container:            "#8c1d18"
    on-error-container:         "#f9dedc"

    # ── Surface ─────────────────────────────────────────────
    surface:                    "#1c1b1f"
    on-surface:                 "#e6e1e5"
    on-surface-variant:         "#cac4d0"
    surface-variant:            "#49454f"
    surface-container-lowest:   "#0f0d13"
    surface-container-low:      "#1d1b20"
    surface-container:          "#211f26"
    surface-container-high:     "#2b2930"
    surface-container-highest:  "#36343b"
    surface-dim:                "#1c1b1f"
    surface-bright:             "#3b383e"

    # ── Outline ─────────────────────────────────────────────
    outline:                    "#938f99"
    outline-variant:            "#49454f"

    # ── Utility ─────────────────────────────────────────────
    scrim:                      "#000000"
    shadow:                     "#000000"
    inverse-surface:            "#e6e1e5"
    inverse-on-surface:         "#313033"
    inverse-primary:            "#6750a4"


# ╔══════════════════════════════════════════════════════════╗
# ║  TYPOGRAPHY — M3 TYPE SCALE                             ║
# ║  Source: https://m3.material.io/styles/typography       ║
# ║  Default typeface: Roboto                               ║
# ║  Scale method: Major Second (1.125), base 14sp          ║
# ╚══════════════════════════════════════════════════════════╝

typography:
  font:
    brand: "Roboto"           # Used for Display, Headline (expressive)
    plain: "Roboto"           # Used for Body, Label (readable)
    mono: "Roboto Mono"       # For code samples

  scale:
    # ── Display ─────────────────────────────────────────────
    display-large:
      size: 57
      weight: 400
      line-height: 1.123   # 64sp
      letter-spacing: -0.25
    display-medium:
      size: 45
      weight: 400
      line-height: 1.155   # 52sp
      letter-spacing: 0
    display-small:
      size: 36
      weight: 400
      line-height: 1.222   # 44sp
      letter-spacing: 0

    # ── Headline ────────────────────────────────────────────
    headline-large:
      size: 32
      weight: 400
      line-height: 1.25    # 40sp
      letter-spacing: 0
    headline-medium:
      size: 28
      weight: 400
      line-height: 1.285   # 36sp
      letter-spacing: 0
    headline-small:
      size: 24
      weight: 400
      line-height: 1.333   # 32sp
      letter-spacing: 0

    # ── Title ───────────────────────────────────────────────
    title-large:
      size: 22
      weight: 400
      line-height: 1.272   # 28sp
      letter-spacing: 0
    title-medium:
      size: 16
      weight: 500
      line-height: 1.5     # 24sp
      letter-spacing: 0.15
    title-small:
      size: 14
      weight: 500
      line-height: 1.428   # 20sp
      letter-spacing: 0.1

    # ── Body ────────────────────────────────────────────────
    body-large:
      size: 16
      weight: 400
      line-height: 1.5     # 24sp
      letter-spacing: 0.5
    body-medium:
      size: 14
      weight: 400
      line-height: 1.428   # 20sp
      letter-spacing: 0.25
    body-small:
      size: 12
      weight: 400
      line-height: 1.333   # 16sp
      letter-spacing: 0.4

    # ── Label ───────────────────────────────────────────────
    label-large:
      size: 14
      weight: 500
      line-height: 1.428   # 20sp
      letter-spacing: 0.1
    label-medium:
      size: 12
      weight: 500
      line-height: 1.333   # 16sp
      letter-spacing: 0.5
    label-small:
      size: 11
      weight: 500
      line-height: 1.454   # 16sp
      letter-spacing: 0.5


# ╔══════════════════════════════════════════════════════════╗
# ║  SHAPE — CORNER RADIUS SCALE                            ║
# ║  Source: https://m3.material.io/styles/shape            ║
# ╚══════════════════════════════════════════════════════════╝

shape:
  extra-small:  4     # dp — Text fields, menu items, snack bars, tooltip
  small:        8     # dp — Chips, text fields (rounded variant)
  medium:       12    # dp — Cards, dialogs, menus
  large:        16    # dp — FAB, navigation bar, sheets (small)
  extra-large:  28    # dp — Bottom sheets, extended FAB, large components
  full:         "50%" # Pills, badges, avatar containers


# ╔══════════════════════════════════════════════════════════╗
# ║  SPACING — 4DP BASE GRID                                ║
# ║  All spacing must be a multiple of 4dp                  ║
# ╚══════════════════════════════════════════════════════════╝

spacing:
  # Token    dp    Common use
  space-1:    4    # Tight insets, icon padding
  space-2:    8    # Component internal padding (small)
  space-3:   12    # Component internal padding (medium)
  space-4:   16    # Standard inset — padding within content areas
  space-5:   20    # Navigation item padding
  space-6:   24    # Section spacing, card padding
  space-7:   32    # Large component gaps
  space-8:   48    # Section separators
  space-9:   64    # Article-level separation
  space-10: 128    # Major layout separators

  # Named semantic aliases
  inset-compact:   8
  inset-default:  16
  inset-relaxed:  24
  gap-dense:       8
  gap-default:    16
  gap-loose:      24


# ╔══════════════════════════════════════════════════════════╗
# ║  ELEVATION — TONAL MODEL                                ║
# ║  Depth via surface-container-* tones, not shadows       ║
# ╚══════════════════════════════════════════════════════════╝

elevation:
  level-0:
    surface-token: surface
    shadow-alpha:  0
  level-1:
    surface-token: surface-container-low
    shadow-alpha:  0.05
  level-2:
    surface-token: surface-container
    shadow-alpha:  0.08
  level-3:
    surface-token: surface-container-high
    shadow-alpha:  0.11
  level-4:
    surface-token: surface-container-highest
    shadow-alpha:  0.12
  level-5:
    surface-token: surface-container-highest
    shadow-alpha:  0.14


# ╔══════════════════════════════════════════════════════════╗
# ║  MOTION — SPRING-BASED SYSTEM (M3 Expressive / Standard)║
# ║  Source: https://m3.material.io/styles/motion/overview  ║
# ╚══════════════════════════════════════════════════════════╝

motion:
  schemes:
    expressive:
      description: "Bouncy, alive — hero moments and key interactions"
      spatial-fast:   {stiffness: 700, damping: 0.5}
      spatial-default:{stiffness: 380, damping: 0.75}
      spatial-slow:   {stiffness: 200, damping: 0.85}
      effects-fast:   {stiffness: 900, damping: 1.0}
      effects-default:{stiffness: 450, damping: 1.0}
      effects-slow:   {stiffness: 200, damping: 1.0}
    standard:
      description: "Functional, minimal bounce — utilitarian products"
      spatial-fast:   {stiffness: 900, damping: 1.0}
      spatial-default:{stiffness: 450, damping: 1.0}
      spatial-slow:   {stiffness: 200, damping: 1.0}
      effects-fast:   {stiffness: 900, damping: 1.0}
      effects-default:{stiffness: 450, damping: 1.0}
      effects-slow:   {stiffness: 200, damping: 1.0}

  # Legacy easing (pre-M3 Expressive, still valid fallback)
  easing:
    fast-out-slow-in:  "cubic-bezier(0.4, 0, 0.2, 1)"   # Standard
    linear-out-slow-in:"cubic-bezier(0, 0, 0.2, 1)"      # Decelerate (entrance)
    fast-out-linear-in:"cubic-bezier(0.4, 0, 1, 1)"      # Accelerate (exit)

  duration:
    short-1:  50ms    # Icon swaps, micro-states
    short-2: 100ms    # Small fades, hover responses
    medium-1:200ms    # Component entrances (standard)
    medium-2:300ms    # Panel transitions, dialogs
    long-1:  400ms    # Page-level transitions
    long-2:  500ms    # Full-screen transitions
