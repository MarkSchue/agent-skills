# ╔══════════════════════════════════════════════════════════╗
# ║  COLOR TOKENS — ALL 4 THEMES                            ║
# ║  Source: https://carbondesignsystem.com/elements/color  ║
# ╚══════════════════════════════════════════════════════════╝

color:

  # ── IBM Core Color Palette Anchors (not tokens — source palette) ─────────
  ibm-palette:
    black:    "#000000"
    gray-100: "#161616"
    gray-90:  "#262626"
    gray-80:  "#393939"
    gray-70:  "#525252"
    gray-60:  "#6f6f6f"
    gray-50:  "#8d8d8d"
    gray-40:  "#a8a8a8"
    gray-30:  "#c6c6c6"
    gray-20:  "#e0e0e0"
    gray-10:  "#f4f4f4"
    white:    "#ffffff"
    blue-100: "#001141"
    blue-90:  "#001d6c"
    blue-80:  "#002d9c"
    blue-70:  "#0043ce"
    blue-60:  "#0f62fe"   # IBM Blue — primary action color
    blue-50:  "#4589ff"
    blue-40:  "#78a9ff"
    blue-30:  "#a6c8ff"
    blue-20:  "#d0e2ff"
    blue-10:  "#edf5ff"
    red-60:   "#da1e28"   # Error
    red-50:   "#fa4d56"
    red-40:   "#ff8389"
    yellow-30:"#f1c21b"   # Warning
    green-60: "#198038"
    green-50: "#24a148"   # Success
    green-40: "#42be65"
    purple-60:"#8a3ffc"
    teal-60:  "#009d9a"
    cool-gray-100: "#121619"
    warm-gray-100: "#171414"

  # ── White Theme ─────────────────────────────────────────
  white:
    # Background
    background:               "#ffffff"
    background-hover:         "#e8e8e8"    # Gray 10 -5 (half step)
    background-active:        "#c6c6c6"    # Gray 30
    background-selected:      "#e0e0e0"    # Gray 20
    background-selected-hover:"#cacaca"

    # Layer
    layer-01:                 "#f4f4f4"    # Gray 10
    layer-02:                 "#ffffff"    # White
    layer-03:                 "#f4f4f4"    # Gray 10
    layer-hover-01:           "#e8e8e8"
    layer-hover-02:           "#e8e8e8"
    layer-active-01:          "#c6c6c6"
    layer-selected-01:        "#e0e0e0"
    layer-accent-01:          "#e0e0e0"    # Gray 20
    layer-accent-02:          "#e0e0e0"
    layer-accent-hover-01:    "#d1d1d1"

    # Field
    field-01:                 "#f4f4f4"
    field-02:                 "#ffffff"
    field-hover-01:           "#e8e8e8"

    # Border
    border-subtle-00:         "#e0e0e0"    # Gray 20
    border-subtle-01:         "#c6c6c6"    # Gray 30
    border-subtle-02:         "#e0e0e0"
    border-strong-01:         "#8d8d8d"    # Gray 50
    border-strong-02:         "#8d8d8d"
    border-inverse:           "#161616"    # Gray 100
    border-interactive:       "#0f62fe"    # Blue 60

    # Text
    text-primary:             "#161616"    # Gray 100
    text-secondary:           "#525252"    # Gray 70
    text-placeholder:         "#a8a8a8"    # Gray 40
    text-helper:              "#6f6f6f"    # Gray 60
    text-error:               "#da1e28"    # Red 60
    text-inverse:             "#ffffff"
    text-on-color:            "#ffffff"
    text-on-color-disabled:   "#8d8d8d"
    text-disabled:            "#c6c6c6"    # Gray 30

    # Link
    link-primary:             "#0f62fe"    # Blue 60
    link-primary-hover:       "#0043ce"    # Blue 70
    link-secondary:           "#0043ce"
    link-visited:             "#8a3ffc"    # Purple 60
    link-inverse:             "#78a9ff"    # Blue 40

    # Icon
    icon-primary:             "#161616"
    icon-secondary:           "#525252"
    icon-inverse:             "#ffffff"
    icon-on-color:            "#ffffff"
    icon-disabled:            "#c6c6c6"
    icon-interactive:         "#0f62fe"

    # Support (semantic status)
    support-error:            "#da1e28"    # Red 60
    support-warning:          "#f1c21b"    # Yellow 30
    support-success:          "#24a148"    # Green 50
    support-info:             "#0043ce"    # Blue 70
    support-error-inverse:    "#fa4d56"
    support-warning-inverse:  "#f1c21b"
    support-success-inverse:  "#42be65"
    support-info-inverse:     "#4589ff"

    # Interaction
    focus:                    "#0f62fe"    # Blue 60
    focus-inset:              "#ffffff"
    focus-inverse:            "#ffffff"
    interactive:              "#0f62fe"
    highlight:                "#d0e2ff"    # Blue 20
    overlay:                  "rgba(22,22,22,0.50)"
    skeleton-element:         "#e0e0e0"
    skeleton-background:      "#e8e8e8"

    # Button tokens
    button-primary:           "#0f62fe"
    button-primary-hover:     "#0353e9"
    button-primary-active:    "#002d9c"
    button-secondary:         "#393939"
    button-secondary-hover:   "#474747"
    button-secondary-active:  "#6f6f6f"
    button-danger-primary:    "#da1e28"
    button-danger-hover:      "#b81922"
    button-danger-active:     "#750e13"
    button-separator:         "#e0e0e0"
    button-disabled:          "#c6c6c6"

  # ── Gray 100 Dark Theme ─────────────────────────────────
  gray-100:
    background:               "#161616"
    background-hover:         "#2c2c2c"
    background-active:        "#525252"
    background-selected:      "#393939"
    background-selected-hover:"#4c4c4c"

    layer-01:                 "#262626"
    layer-02:                 "#393939"
    layer-03:                 "#525252"
    layer-hover-01:           "#333333"
    layer-hover-02:           "#474747"
    layer-active-01:          "#525252"
    layer-selected-01:        "#393939"
    layer-accent-01:          "#393939"

    field-01:                 "#262626"
    field-02:                 "#393939"

    border-subtle-00:         "#393939"
    border-subtle-01:         "#525252"
    border-subtle-02:         "#525252"
    border-strong-01:         "#6f6f6f"
    border-strong-02:         "#6f6f6f"
    border-inverse:           "#f4f4f4"
    border-interactive:       "#4589ff"    # Blue 50

    text-primary:             "#f4f4f4"
    text-secondary:           "#c6c6c6"
    text-placeholder:         "#6f6f6f"
    text-helper:              "#8d8d8d"
    text-error:               "#ff8389"    # Red 40
    text-inverse:             "#161616"
    text-on-color:            "#ffffff"
    text-disabled:            "#525252"

    link-primary:             "#78a9ff"    # Blue 40
    link-primary-hover:       "#a6c8ff"    # Blue 30
    link-inverse:             "#0f62fe"

    icon-primary:             "#f4f4f4"
    icon-secondary:           "#c6c6c6"
    icon-inverse:             "#161616"
    icon-disabled:            "#525252"
    icon-interactive:         "#78a9ff"

    support-error:            "#ff8389"    # Red 40
    support-warning:          "#f1c21b"    # Yellow 30
    support-success:          "#42be65"    # Green 40
    support-info:             "#4589ff"    # Blue 50

    focus:                    "#ffffff"
    focus-inset:              "#161616"
    focus-inverse:            "#0f62fe"
    interactive:              "#4589ff"
    highlight:                "#002d9c"
    overlay:                  "rgba(0,0,0,0.65)"
    skeleton-element:         "#393939"
    skeleton-background:      "#333333"

    button-primary:           "#0f62fe"
    button-primary-hover:     "#0353e9"
    button-primary-active:    "#002d9c"
    button-secondary:         "#6f6f6f"
    button-secondary-hover:   "#5e5e5e"
    button-secondary-active:  "#8d8d8d"
    button-danger-primary:    "#da1e28"
    button-danger-hover:      "#b81922"
    button-danger-active:     "#750e13"
    button-disabled:          "#393939"


# ╔══════════════════════════════════════════════════════════╗
# ║  TYPOGRAPHY — IBM PLEX TYPE SCALE                       ║
# ║  Source: https://carbondesignsystem.com/typography      ║
# ╚══════════════════════════════════════════════════════════╝

typography:
  fonts:
    sans:  "'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif"
    serif: "'IBM Plex Serif', 'Georgia', Times, serif"
    mono:  "'IBM Plex Mono', 'Menlo', 'DejaVu Sans Mono', Courier, monospace"

  # IBM type scale: Xn = Xn-1 + {INT[(n-2)/4] + 1} * 2, base = 12px
  scale:
    plex-12:   {size: 12,  rem: 0.75}
    plex-14:   {size: 14,  rem: 0.875}
    plex-16:   {size: 16,  rem: 1.0}
    plex-18:   {size: 18,  rem: 1.125}
    plex-20:   {size: 20,  rem: 1.25}
    plex-24:   {size: 24,  rem: 1.5}
    plex-28:   {size: 28,  rem: 1.75}
    plex-32:   {size: 32,  rem: 2.0}
    plex-36:   {size: 36,  rem: 2.25}
    plex-42:   {size: 42,  rem: 2.625}
    plex-48:   {size: 48,  rem: 3.0}
    plex-54:   {size: 54,  rem: 3.375}
    plex-60:   {size: 60,  rem: 3.75}
    plex-68:   {size: 68,  rem: 4.25}
    plex-76:   {size: 76,  rem: 4.75}
    plex-84:   {size: 84,  rem: 5.25}
    plex-92:   {size: 92,  rem: 5.75}

  # ── Productive Type Set (Product / UI use) ───────────────
  productive:
    code-01:         {size: 12, weight: 400, line-height: 1.333, font: mono}
    code-02:         {size: 14, weight: 400, line-height: 1.428, font: mono}
    label-01:        {size: 12, weight: 400, line-height: 1.333}
    label-02:        {size: 14, weight: 400, line-height: 1.428}
    helper-text-01:  {size: 12, weight: 400, line-height: 1.333, italic: true}
    helper-text-02:  {size: 14, weight: 400, line-height: 1.428, italic: true}
    body-01:         {size: 14, weight: 400, line-height: 1.428}
    body-02:         {size: 16, weight: 400, line-height: 1.5}
    body-compact-01: {size: 14, weight: 400, line-height: 1.285}
    body-compact-02: {size: 16, weight: 400, line-height: 1.375}
    heading-01:      {size: 14, weight: 600, line-height: 1.285}      # SemiBold
    heading-02:      {size: 16, weight: 600, line-height: 1.375}
    heading-03:      {size: 20, weight: 400, line-height: 1.4}
    heading-04:      {size: 28, weight: 400, line-height: 1.285}
    heading-05:      {size: 36, weight: 400, line-height: 1.222}
    heading-06:      {size: 42, weight: 300, line-height: 1.238}      # Light
    heading-07:      {size: 54, weight: 300, line-height: 1.111}

  # ── Expressive Type Set (Editorial / Marketing) ──────────
  expressive:
    display-01:      {size: 42, weight: 300, line-height: 1.238}
    display-02:      {size: 42, weight: 600, line-height: 1.238}
    expressive-heading-01: {size: 14, weight: 600, line-height: 1.285}
    expressive-heading-02: {size: 16, weight: 600, line-height: 1.375}
    expressive-heading-03: {size: 20, weight: 400, line-height: 1.4}
    expressive-heading-04: {size: 28, weight: 400, line-height: 1.285}
    expressive-heading-05: {size: 36, weight: 400, line-height: 1.222, responsive: true}
    expressive-heading-06: {size: 48, weight: 300, line-height: 1.208, responsive: true}
    expressive-paragraph-01: {size: 24, weight: 300, line-height: 1.333}
    quotation-01:    {size: 20, weight: 400, line-height: 1.4, italic: true}
    quotation-02:    {size: 32, weight: 300, line-height: 1.375, italic: true}


# ╔══════════════════════════════════════════════════════════╗
# ║  SPACING — CARBON SPACING SCALE                         ║
# ║  Source: https://carbondesignsystem.com/spacing          ║
# ╚══════════════════════════════════════════════════════════╝

spacing:
  # Token          rem    px
  spacing-01:   {rem: 0.125,  px: 2}    # 3xs
  spacing-02:   {rem: 0.25,   px: 4}    # 2xs
  spacing-03:   {rem: 0.5,    px: 8}    # xs
  spacing-04:   {rem: 0.75,   px: 12}   # sm
  spacing-05:   {rem: 1.0,    px: 16}   # md — standard inset
  spacing-06:   {rem: 1.5,    px: 24}   # lg
  spacing-07:   {rem: 2.0,    px: 32}   # xl
  spacing-08:   {rem: 2.5,    px: 40}   # 2xl
  spacing-09:   {rem: 3.0,    px: 48}   # 3xl
  spacing-10:   {rem: 4.0,    px: 64}   # 4xl
  spacing-11:   {rem: 5.0,    px: 80}   # 5xl
  spacing-12:   {rem: 6.0,    px: 96}   # 6xl
  spacing-13:   {rem: 10.0,   px: 160}  # 7xl


# ╔══════════════════════════════════════════════════════════╗
# ║  2X GRID — BREAKPOINTS                                  ║
# ║  Source: https://carbondesignsystem.com/elements/2x-grid ║
# ╚══════════════════════════════════════════════════════════╝

grid:
  mini-unit: 8       # px — base unit for all layout
  padding:  16       # px — fixed at all breakpoints

  breakpoints:
    sm:  {min-width: 320,   max-width: 671,   columns: 4,  gutter: 0,   margin: 0}
    md:  {min-width: 672,   max-width: 1055,  columns: 8,  gutter: 16,  margin: 16}
    lg:  {min-width: 1056,  max-width: 1311,  columns: 16, gutter: 16,  margin: 16}
    xlg: {min-width: 1312,  max-width: 1583,  columns: 16, gutter: 16,  margin: 16}
    max: {min-width: 1584,  max-width: null,  columns: 16, gutter: 24,  margin: 24}

  fixed-sizing-scale:  [8, 16, 24, 32, 48, 64, 80]
  aspect-ratios:       ["1:1", "2:1", "2:3", "3:2", "4:3", "16:9"]


# ╔══════════════════════════════════════════════════════════╗
# ║  MOTION                                                  ║
# ║  Source: https://carbondesignsystem.com/elements/motion  ║
# ╚══════════════════════════════════════════════════════════╝

motion:
  easing:
    # Standard — element stays visible start to finish
    standard-productive:   "cubic-bezier(0.2, 0, 0.38, 0.9)"
    standard-expressive:   "cubic-bezier(0.4, 0.14, 0.3, 1)"
    # Entrance — element quickly enters, decelerates to stop
    entrance-productive:   "cubic-bezier(0, 0, 0.38, 0.9)"
    entrance-expressive:   "cubic-bezier(0, 0, 0.3, 1)"
    # Exit — element accelerates out of view
    exit-productive:       "cubic-bezier(0.2, 0, 1, 0.9)"
    exit-expressive:       "cubic-bezier(0.4, 0.14, 1, 1)"

  duration:
    fast-01:      70ms   # Micro-interactions: button, toggle
    fast-02:     110ms   # Micro-interactions: fade
    moderate-01: 150ms   # Micro-interactions, small expansion, short movement
    moderate-02: 240ms   # Expansion, system communication, toast
    slow-01:     400ms   # Large expansion, important system notifications
    slow-02:     700ms   # Background dimming
