# Carbon Design System — Gray 100 Dark Theme Design Config
# ─────────────────────────────────────────────────────────────────────────────
# System:  IBM Carbon Design System v11
# Theme:   Gray 100 (Dark)
# Source:  https://carbondesignsystem.com/elements/color/overview/
# ─────────────────────────────────────────────────────────────────────────────

canvas:
  aspect-ratio: "16:9"
  width:  1920
  height: 1080
  margin: 80
  padding: 16
  gutter: 16
  baseline-grid: 8

platform: pptx              # Change to: drawio | pptx

preset: carbon

colors:
  # ── Primary ─────────────────────────────────────────────
  primary:              "#0f62fe"    # IBM Blue 60 (unchanged in dark)
  on-primary:           "#ffffff"
  primary-container:    "#002d9c"    # Blue 80
  on-primary-container: "#d0e2ff"    # Blue 20

  secondary:            "#6f6f6f"
  on-secondary:         "#ffffff"
  secondary-container:  "#393939"    # Gray 80
  on-secondary-container: "#f4f4f4"

  # ── Surfaces / Layers ───────────────────────────────────
  surface:              "#161616"    # $background (Gray 100)
  on-surface:           "#f4f4f4"    # $text-primary
  on-surface-variant:   "#c6c6c6"    # $text-secondary
  surface-variant:      "#393939"    # $layer-02
  surface-container-lowest: "#0d0d0d"
  surface-container-low:    "#262626"    # $layer-01
  surface-container:        "#393939"    # $layer-02
  surface-container-high:   "#525252"    # $layer-03
  surface-container-highest:"#6f6f6f"

  # ── Status Colors ───────────────────────────────────────
  error:                "#ff8389"    # $support-error (Red 40)
  on-error:             "#161616"
  error-container:      "#750e13"    # Red 90
  on-error-container:   "#ffd7d9"    # Red 10

  warning:              "#f1c21b"    # $support-warning (Yellow 30 — same)
  success:              "#42be65"    # $support-success (Green 40)
  on-success:           "#161616"

  # ── Outline / Border ────────────────────────────────────
  outline:              "#6f6f6f"    # $border-strong-01
  outline-variant:      "#393939"    # $border-subtle-00
  neutral:              "#8d8d8d"
  border-subtle:        "#525252"    # $border-subtle-01

  # ── Inverse ─────────────────────────────────────────────
  inverse-surface:      "#f4f4f4"
  inverse-on-surface:   "#161616"
  inverse-primary:      "#0f62fe"    # Blue 60

  scrim:                "rgba(0,0,0,0.65)"

borders:
  radius-sharp:   0
  radius-medium:  4
  radius-large:   8

typography:
  font-family: "IBM Plex Sans"
  heading-display:
    size: 54
    weight: 300
    line-height: 1.11
  heading:
    size: 32
    weight: 400
    line-height: 1.25
  heading-sub:
    size: 20
    weight: 400
    line-height: 1.4
  body:
    size: 16
    weight: 400
    line-height: 1.5
  label:
    size: 14
    weight: 400
    line-height: 1.43
  caption:
    size: 12
    weight: 400
    line-height: 1.33
  annotation:
    size: 12
    weight: 600
    line-height: 1.285

spacing:
  xs:   4
  s:    8
  m:   16
  l:   24
  xl:  48

elevation:
  none:   {blur: 0,  distance: 0,  opacity: 0}
  low:    {blur: 2,  distance: 1,  angle: 90, opacity: 0.15}
  medium: {blur: 8,  distance: 2,  angle: 90, opacity: 0.22}
  high:   {blur: 16, distance: 4,  angle: 90, opacity: 0.30}
