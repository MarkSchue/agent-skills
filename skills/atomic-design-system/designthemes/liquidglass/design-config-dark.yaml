# Apple Liquid Glass — Dark Theme Design Config
# ─────────────────────────────────────────────────────────────────────────────
# System:  Apple Human Interface Guidelines — Liquid Glass
# Theme:   Dark (Dark appearance)
# Source:  https://developer.apple.com/design/human-interface-guidelines/
# ─────────────────────────────────────────────────────────────────────────────

canvas:
  aspect-ratio: "16:9"
  width:  1920
  height: 1080
  margin: 80
  padding: 28
  gutter: 24
  baseline-grid: 8

platform: pptx

preset: liquidglass

colors:
  # ── Primary Accent — System Blue (Dark) ─────────────────
  primary:                    "#0A84FF"    # iOS System Blue (dark)
  on-primary:                 "#FFFFFF"
  primary-container:          "#003461"    # Dark blue glass pane
  on-primary-container:       "#66B2FF"

  # ── Secondary ───────────────────────────────────────────
  secondary:                  "#5E5CE6"    # Indigo (dark)
  on-secondary:               "#FFFFFF"
  secondary-container:        "#1C1B5E"
  on-secondary-container:     "#ADADF8"

  # ── Tertiary ────────────────────────────────────────────
  tertiary:                   "#64D2FF"    # System Teal (dark)
  on-tertiary:                "#003A5C"
  tertiary-container:         "#002A45"
  on-tertiary-container:      "#9DE8FF"

  # ── Error ───────────────────────────────────────────────
  error:                      "#FF453A"    # System Red (dark)
  on-error:                   "#FFFFFF"
  error-container:            "#4A0000"
  on-error-container:         "#FFA39E"

  # ── Surface — Dark Glass Layer System ───────────────────
  surface:                    "#1C1C1E"    # iOS system background (dark)
  on-surface:                 "#FFFFFF"    # Label primary (dark)
  on-surface-variant:         "#EBEBF5"    # Label secondary (dark) @60%
  surface-variant:            "#2C2C2E"    # Grouped table background (dark)
  surface-container-lowest:   "#000000"    # Deepest layer
  surface-container-low:      "#1C1C1E"    # System background
  surface-container:          "#2C2C2E"    # Secondary background
  surface-container-high:     "#3A3A3C"    # Tertiary background
  surface-container-highest:  "#48484A"    # Quaternary background

  # ── Outline / Separator ──────────────────────────────────
  outline:                    "#38383A"    # Separator (dark)
  outline-variant:            "#48484A"    # Opaque separator (dark)
  neutral:                    "#8D8D93"    # Label tertiary (dark)
  border-subtle:              "#48484A"

  # ── Utility / Inverse ───────────────────────────────────
  inverse-surface:            "#F2F2F7"
  inverse-on-surface:         "#1C1C1E"
  inverse-primary:            "#007AFF"
  scrim:                      "rgba(0,0,0,0.60)"
  shadow:                     "#000000"

  # ── Semantic Status Colors ───────────────────────────────
  warning:                    "#FF9F0A"    # System Orange (dark)
  success:                    "#30D158"    # System Green (dark)
  on-success:                 "#FFFFFF"

borders:
  radius-sharp:   10
  radius-medium:  20
  radius-large:   36

typography:
  font-family: "SF Pro Display"
  heading-display:
    size: 56
    weight: 700
    line-height: 1.07
  heading:
    size: 34
    weight: 700
    line-height: 1.21
  heading-sub:
    size: 22
    weight: 600
    line-height: 1.27
  body:
    size: 17
    weight: 400
    line-height: 1.47
  label:
    size: 15
    weight: 500
    line-height: 1.33
  caption:
    size: 13
    weight: 400
    line-height: 1.38
  annotation:
    size: 11
    weight: 400
    line-height: 1.36

spacing:
  xs:   4
  s:    8
  m:   16
  l:   24
  xl:  48

elevation:
  none:   {blur: 0,  distance: 0,  opacity: 0}
  low:    {blur: 4,  distance: 1,  angle: 90, opacity: 0.20}
  medium: {blur: 16, distance: 4,  angle: 90, opacity: 0.28}
  high:   {blur: 40, distance: 8,  angle: 90, opacity: 0.36}
