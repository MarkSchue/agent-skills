## Shape Tokens (borders)

| Token | Value | Usage |
|---|---|---|
| `radius-sharp` | `10` | Inputs, tags, small buttons |
| `radius-medium` | `20` | Cards, panels, list sections |
| `radius-large` | `36` | Modals, hero containers, sheets |

> **Note:** `radius-large ≥ 20` triggers ellipse-based hero decoration in both builders.
> `radius-large ≥ 32` triggers the dual-nested glass ellipse (Liquid Glass signature).

