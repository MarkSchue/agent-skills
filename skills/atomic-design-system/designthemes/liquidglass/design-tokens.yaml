| `primary` | `#007AFF` | Interactive elements, tint color, links |
| `on-primary` | `#FFFFFF` | Content on primary fills |
| `primary-container` | `#CCE4FF` | Light glass pane — hero deco, card accent |
| `on-primary-container` | `#003D82` | Text on primary-container |

