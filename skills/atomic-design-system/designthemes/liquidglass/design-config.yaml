# Apple Liquid Glass — Light Theme Design Config
# ─────────────────────────────────────────────────────────────────────────────
# System:  Apple Human Interface Guidelines — Liquid Glass
# Theme:   Light (Default appearance)
# Source:  https://developer.apple.com/design/human-interface-guidelines/
# WWDC:    2025 — "Meet Liquid Glass"
# ─────────────────────────────────────────────────────────────────────────────

canvas:
  aspect-ratio: "16:9"
  width:  1920
  height: 1080
  margin: 80
  padding: 28               # Apple HIG: generous breathing room, 8pt grid
  gutter: 24
  baseline-grid: 8          # Apple: 8pt grid (standard across all Apple platforms)

platform: pptx              # Change to: drawio | pptx

preset: liquidglass

colors:
  # ── Primary Accent — System Blue ────────────────────────
  primary:                    "#007AFF"    # iOS/macOS System Blue
  on-primary:                 "#FFFFFF"    # White on System Blue
  primary-container:          "#CCE4FF"    # Blue tint — light glass pane
  on-primary-container:       "#003D82"    # Deep blue for text on container

  # ── Secondary Accent — System Indigo/Purple ─────────────
  secondary:                  "#5856D6"    # System Indigo
  on-secondary:               "#FFFFFF"
  secondary-container:        "#E5E4FF"    # Indigo tint glass pane
  on-secondary-container:     "#1F1E6E"    # Deep indigo for text

  # ── Tertiary Accent — System Teal ───────────────────────
  tertiary:                   "#32ADE6"    # System Teal/Blue secondary
  on-tertiary:                "#FFFFFF"
  tertiary-container:         "#D6F2FC"    # Teal glass pane
  on-tertiary-container:      "#003D5C"    # Deep teal for text

  # ── Error — System Red ──────────────────────────────────
  error:                      "#FF3B30"    # iOS System Red
  on-error:                   "#FFFFFF"
  error-container:            "#FFE5E4"    # Red tint surface
  on-error-container:         "#7A0000"    # Deep red for error text

  # ── Surface — Glass Layer System ────────────────────────
  surface:                    "#FFFFFF"    # Primary glass surface (white card)
  on-surface:                 "#000000"    # Label primary (iOS label color)
  on-surface-variant:         "#6D6D72"    # Label secondary (3C3C43 @60%)
  surface-variant:            "#F2F2F7"    # System grouped background (base)
  surface-container-lowest:   "#FFFFFF"    # Elevated glass — whitest layer
  surface-container-low:      "#F9F9FB"    # Glass shimmer — slight vibrancy tint
  surface-container:          "#F2F2F7"    # Base layer — grouped table bg
  surface-container-high:     "#E5E5EA"    # Inset layer — fill/secondary surface
  surface-container-highest:  "#D1D1D6"    # Deep layer — opaque backgrounds

  # ── Outline / Separator ──────────────────────────────────
  outline:                    "#C6C6C8"    # iOS separator color
  outline-variant:            "#E5E5EA"    # iOS separator (opaque) light
  neutral:                    "#8E8E93"    # iOS label tertiary
  border-subtle:              "#E5E5EA"    # iOS separator fill

  # ── Utility / Inverse ───────────────────────────────────
  inverse-surface:            "#1C1C1E"    # Dark glass surface
  inverse-on-surface:         "#F2F2F7"    # Text on dark glass
  inverse-primary:            "#409CFF"    # System blue — dark mode
  scrim:                      "rgba(0,0,0,0.40)"   # iOS tint over glass
  shadow:                     "#000000"

  # ── Semantic Status Colors (System palette) ─────────────
  warning:                    "#FF9500"    # iOS System Orange
  success:                    "#34C759"    # iOS System Green
  on-success:                 "#FFFFFF"

borders:
  radius-sharp:   10          # Apple HIG: small controls, inputs, tags
  radius-medium:  20          # Apple HIG: cards, panels, grouped items
  radius-large:   36          # Apple HIG: modals, hero containers, sheets

typography:
  font-family: "SF Pro Display"
  heading-display:
    size: 56
    weight: 700               # SF Pro Bold — Display headers
    line-height: 1.07
  heading:
    size: 34
    weight: 700               # SF Pro Bold — Large Title
    line-height: 1.21
  heading-sub:
    size: 22
    weight: 600               # SF Pro Semibold — Title 2
    line-height: 1.27
  body:
    size: 17
    weight: 400               # SF Pro Regular — Body
    line-height: 1.47
  label:
    size: 15
    weight: 500               # SF Pro Medium — Subheadline
    line-height: 1.33
  caption:
    size: 13
    weight: 400               # SF Pro Regular — Footnote
    line-height: 1.38
  annotation:
    size: 11
    weight: 400               # SF Pro Regular — Caption 2
    line-height: 1.36

spacing:
  xs:   4                     # micro — icon gap, tight label spacing
  s:    8                     # compact — list item padding
  m:   16                     # standard — content padding
  l:   24                     # comfortable — section gap
  xl:  48                     # spacious — major section separation

elevation:
  none:   {blur: 0,  distance: 0,  opacity: 0}
  low:    {blur: 4,  distance: 1,  angle: 90, opacity: 0.06}   # glass card — whisper shadow
  medium: {blur: 16, distance: 4,  angle: 90, opacity: 0.10}   # modal/sheet — glass depth
  high:   {blur: 40, distance: 8,  angle: 90, opacity: 0.14}   # floating panel — full glass
