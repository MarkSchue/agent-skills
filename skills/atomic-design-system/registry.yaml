# Atomic Design System Registry
# -----------------------------------------------------------------
# This file is ALWAYS loaded first — before any element MD file.
# Keep this file under 50 KB. Each description must be ≤ 20 words.
# Add new entries here when introducing new atoms, molecules, or templates.
# -----------------------------------------------------------------

version: 1

atoms:
  - id: icon-wrapper
    description: Embeds a recolorable SVG icon at a themed size with fill token and role annotation.
    file: atoms/ui/icon-wrapper.md
    tags: [icon, svg, decorative, status, action, illustration]
    preview: previews/atoms/icon-wrapper.png

  - id: chart-bar
    description: Horizontal or vertical bar chart populated with labeled numeric series data.
    file: atoms/chart/bar.md
    tags: [chart, data, performance, bar, comparison, data-viz]
    preview: previews/atoms/chart-bar.png
    svg-source: atoms/svg/chart-bar.svg

  - id: chart-pie
    description: Pie or donut chart showing proportional distribution of a numeric dataset.
    file: atoms/chart/pie.md
    tags: [chart, data, distribution, pie, proportion, donut, data-viz]
    preview: previews/atoms/chart-pie.png
    svg-source: atoms/svg/chart-pie.svg

  - id: chart-gantt
    description: Horizontal Gantt timeline chart with labeled tasks, dates, and progress indicators.
    file: atoms/chart/gantt.md
    tags: [chart, timeline, project, gantt, schedule, data-viz]
    preview: previews/atoms/chart-gantt.png
    svg-source: atoms/svg/chart-gantt.svg

  - id: badge-status
    description: Small pill-shaped label indicating a status, category, or priority level.
    file: atoms/ui/badge-status.md
    tags: [badge, status, label, indicator, priority, success, warning, error]
    preview: previews/atoms/badge-status.png

  - id: text-heading
    description: Styled heading line using the active typography token with optional accent rule.
    file: atoms/text/heading.md
    tags: [text, heading, typography, title, h1, h2, h3]
    preview: previews/atoms/text-heading.png

  - id: text-body
    description: Multi-line body copy or bullet list using the active body typography token.
    file: atoms/text/body.md
    tags: [text, body, copy, paragraph, bullets, numbered, list]
    preview: previews/atoms/text-body.png

  - id: shape-divider
    description: Horizontal or vertical rule applying a semantic shape token for visual separation.
    file: atoms/ui/shape-divider.md
    tags: [shape, divider, separator, rule, line, accent-line, border]
    preview: previews/atoms/shape-divider.png

  - id: agenda-entry
    description: Single agenda row with number, time, or icon label plus bold title and optional description.
    file: atoms/ui/agenda-entry.md
    tags: [agenda, schedule, entry, row, layout, program, event, highlight, list]
    preview: previews/atoms/agenda-entry.png

  - id: chart-waveform
    description: Amplitude bar waveform from normalized values or auto-generated sample. Suitable for signal, audio, or any time-series amplitude data.
    file: atoms/chart/waveform.md
    tags: [chart, waveform, amplitude, audio, signal, visualization, data-viz]
    preview: previews/atoms/chart-waveform.png

  - id: chart-dot-line
    description: Lollipop / dumbbell chart with vertical tick lines and dot markers per data point.
    file: atoms/chart/dot-line.md
    tags: [chart, lollipop, dumbbell, dot-line, data-viz, scatter, visualization]
    preview: previews/atoms/chart-dot-line.png

  - id: stat-display
    description: Large metric number with superscript unit and optional sublabel — canonical big-number atom.
    file: atoms/data/stat-display.md
    tags: [stat, number, metric, kpi, value, display, large, heading]
    preview: previews/atoms/stat-display.png

  - id: metric-footer
    description: Two-pair label/value footer row pinned to card bottom for range or reference context.
    file: atoms/data/metric-footer.md
    tags: [footer, metric, label, range, reference, context, bottom]
    preview: previews/atoms/metric-footer.png

  - id: icon-title-header
    description: Header row with square icon tile, bold title, subtitle, and right-aligned pill badge.
    file: atoms/data/icon-title-header.md
    tags: [header, icon, title, subtitle, badge, pill, section-header]
    preview: previews/atoms/icon-title-header.png

molecules:
  # ── Strategy domain ──────────────────────────────────────────────
  - id: mission-card
    description: Card presenting a mission or vision statement with icon, title, and statement.
    file: molecules/strategy/mission-card.md
    tags: [strategy, mission, vision, statement]
    preview: previews/molecules/mission-card.png
    domain: strategy
    required_atoms: [icon-wrapper, text-heading, text-body, shape-divider]

  - id: column-conclusion-card
    description: 2–5 equal columns with optional icon, large metric, bold headline, body text, conclusion divider, and chevron.
    file: molecules/strategy/column-conclusion-card.md
    tags: [strategy, columns, conclusion, summary, card]
    preview: previews/molecules/column-conclusion-card.png
    domain: strategy
    required_atoms: [icon-wrapper, text-heading, text-body, shape-divider]

  - id: grid-card
    description: Matrix grid with row-label column, column headers, data rows, cell spanning, and per-cell fill and text customisation.
    file: molecules/strategy/grid-card.md
    tags: [strategy, grid, matrix, card]
    preview: previews/molecules/grid-card.png
    domain: strategy
    required_atoms: [text-heading, text-body, badge-status]

  - id: numbered-list-card
    description: Row-based list with number, badge, or icon gutter, optional bold headline column, and body text. Dividers between rows.
    file: molecules/strategy/numbered-list-card.md
    tags: [strategy, list, numbered, steps, card]
    preview: previews/molecules/numbered-list-card.png
    domain: strategy
    required_atoms: [text-heading, text-body, shape-divider, badge-status]

  - id: step-card
    description: 1–5 column process/step layout with numbered circles or icons, colored accent lines, bold headlines, and body text below a divider.
    file: molecules/strategy/step-card.md
    tags: [strategy, steps, process, numbered, card]
    preview: previews/molecules/step-card.png
    domain: strategy
    required_atoms: [text-heading, text-body, shape-divider]

  - id: table-card
    description: Card-framed data table with header row, alternating fills, and optional total row. Uses native PPTX table and draw.io mxTable.
    file: molecules/strategy/table-card.md
    tags: [strategy, data, table, estimation, card]
    preview: previews/molecules/table-card.png
    domain: strategy
    required_atoms: [text-heading, text-body, shape-divider]

  - id: table-summary-card
    description: KPI strip plus annotated remarks for display beside or beneath a data table. Supports companion table-mode styling.
    file: molecules/strategy/table-summary-card.md
    tags: [strategy, table, kpi, summary, card]
    preview: previews/molecules/table-summary-card.png
    domain: strategy
    required_atoms: [text-heading, text-body, badge-status, shape-divider]

  - id: user-story-card
    description: Structured agile story card with header ID badge and configurable labelled field grid.
    file: molecules/strategy/user-story-card.md
    tags: [strategy, agile, user-story, backlog, card]
    preview: previews/molecules/user-story-card.png
    domain: strategy
    required_atoms: [text-heading, text-body, badge-status, shape-divider]

  - id: timeline-card
    description: Card-framed horizontal or vertical milestone timeline with status dots, per-instance color/orientation overrides, and optional header.
    file: molecules/strategy/timeline-card.md
    tags: [strategy, timeline, milestones, roadmap, phases, card]
    preview: previews/molecules/timeline-card.png
    domain: strategy
    required_atoms: [text-heading, text-body, badge-status, shape-divider]

  - id: objective-card
    description: OKR card showing a strategic objective with key results and progress badges.
    file: molecules/strategy/objective-card.md
    tags: [strategy, okr, objective, goals, progress, key-results]
    preview: previews/molecules/objective-card.png
    domain: strategy
    required_atoms: [text-heading, text-body, badge-status, shape-divider]

  - id: quote-card
    description: Pull-quote card with large typographic quote marks, attribution, and optional portrait.
    file: molecules/strategy/quote-card.md
    tags: [strategy, quote, testimonial, attribution, customer]
    preview: previews/molecules/quote-card.png
    domain: strategy
    required_atoms: [text-heading, text-body, icon-wrapper, shape-divider]

  - id: roadmap-panel
    description: Product or strategic roadmap with Now / Next / Later swim-lanes and item badges.
    file: molecules/strategy/roadmap-panel.md
    tags: [strategy, roadmap, planning, swimlane, product]
    preview: previews/molecules/roadmap-panel.png
    domain: strategy
    required_atoms: [text-heading, text-body, badge-status, shape-divider]

  - id: stacked-text
    description: Stacked text card with title, repeated body rows, and optional takeaway line. Defaults to centre-aligned, middle-valign, and responsive body font size. Supports text_align, text_valign, body_font_size overrides.
    file: molecules/strategy/stacked-text.md
    tags: [strategy, topic, overview, grid, column, summary, stacked, text]
    preview: previews/molecules/topic-card.png
    domain: strategy
    required_atoms: [text-heading, text-body, shape-divider]

  - id: agenda-card
    description: Responsive agenda schedule card with number, time, or icon labels and optional highlight row.
    file: molecules/strategy/agenda-card.md
    tags: [strategy, agenda, program, schedule, event, list, entry, rows, highlight]
    preview: previews/molecules/strategy/agenda-card.png
    domain: strategy
    required_atoms: [agenda-entry, shape-divider]

  # ── Data & Performance domain ─────────────────────────────────────
  - id: kpi-card
    description: Single KPI card with metric value, unit, trend badge, and comparison reference.
    file: molecules/data/kpi-card.md
    tags: [data, kpi, metric, performance, value, trend]
    preview: previews/molecules/kpi-card.png
    domain: data
    required_atoms: [text-heading, text-body, badge-status, icon-wrapper]

  - id: trend-card
    description: Metric card with current value, trend badge, and compact sparkline bar chart.
    file: molecules/data/trend-card.md
    tags: [data, trend, sparkline, time-series, performance]
    preview: previews/molecules/trend-card.png
    domain: data
    required_atoms: [text-heading, text-body, chart-bar, badge-status]

  - id: data-insight-panel
    description: Wide panel combining a chart with written insights and optional supporting KPIs.
    file: molecules/data/data-insight-panel.md
    tags: [data, insight, analysis, chart, summary, panel]
    preview: previews/molecules/data-insight-panel.png
    domain: data
    required_atoms: [text-heading, text-body, chart-bar, badge-status, shape-divider]

  - id: comparison-card
    description: Side-by-side comparison of two options or scenarios with attribute lists.
    file: molecules/data/comparison-card.md
    tags: [data, comparison, before-after, option, versus, decision]
    preview: previews/molecules/comparison-card.png
    domain: data
    required_atoms: [text-heading, text-body, badge-status, shape-divider, icon-wrapper]

  - id: chart-card
    description: Semantic wrapper for any chart atom with a title, period badge, and source note.
    file: molecules/data/chart-card.md
    tags: [data, chart, visualization, wrapper, figure]
    preview: previews/molecules/chart-card.png
    domain: data
    required_atoms: [text-heading, text-body, badge-status, chart-bar, chart-pie]

  # ── Team & Contact domain ─────────────────────────────────────────
  - id: profile-card
    description: Person card with avatar, name, job title, department badge, and optional contact.
    file: molecules/team/profile-card.md
    tags: [team, person, profile, bio, contact, avatar]
    preview: previews/molecules/profile-card.png
    domain: team
    required_atoms: [icon-wrapper, text-heading, text-body, badge-status]

  - id: team-grid-panel
    description: Grid panel composing multiple profile cards in a 2- or 3-column responsive layout.
    file: molecules/team/team-grid-panel.md
    tags: [team, grid, people, org, lineup, leadership]
    preview: previews/molecules/team-grid-panel.png
    domain: team
    required_atoms: [text-heading, text-body, icon-wrapper, badge-status]

  - id: contact-card
    description: Business contact card with name, role, company, email, URL, and channel icons.
    file: molecules/team/contact-card.md
    tags: [team, contact, business-card, communication, outreach, email]
    preview: previews/molecules/contact-card.png
    domain: team
    required_atoms: [icon-wrapper, text-heading, text-body, badge-status, shape-divider]

  - id: role-card
    description: Organizational role card with title, level badge, responsibilities, and reporting line.
    file: molecules/team/role-card.md
    tags: [team, role, responsibilities, org-design, hr, reporting]
    preview: previews/molecules/role-card.png
    domain: team
    required_atoms: [text-heading, text-body, badge-status, shape-divider, icon-wrapper]

  - id: location-card
    description: Office or site card with city name, address, headcount, timezone, and key contact.
    file: molecules/team/location-card.md
    tags: [team, location, office, site, geography, address]
    preview: previews/molecules/location-card.png
    domain: team
    required_atoms: [icon-wrapper, text-heading, text-body, badge-status]

  - id: header-list-card
    description: Card with header strip (avatar · name · detail), a labeled two-column item list, and an optional CTA button.
    file: molecules/team/header-list-card.md
    tags: [team, list, items, profile, header-strip, cta, schedule, booking]
    preview: previews/molecules/header-list-card.png
    domain: team
    layout: stacked-header-body
    required_atoms: [icon-wrapper, text-heading, text-body, badge-status, shape-divider]

  # ── New data visualization molecules ─────────────────────────────
  - id: stats-chart-panel
    description: Wide panel with icon-title header, stacked stat column on left, and bar chart on right.
    file: molecules/data/stats-chart-panel.md
    tags: [data, stats, chart, panel, dual-column, bar-chart, periodic, visualization]
    preview: previews/molecules/stats-chart-panel.png
    domain: data
    layout: header-dual-column
    required_atoms: [icon-title-header, stat-display, chart-bar, shape-divider]

  - id: daily-header-card
    description: Full-width dark header card with large display title and date/time footer row.
    file: molecules/data/daily-header-card.md
    tags: [data, header, title, date, time, overview, daily, display]
    preview: previews/molecules/daily-header-card.png
    domain: data
    layout: hero-full
    required_atoms: [text-heading, text-body, metric-footer]

templates:
  - id: hero-title
    description: Full-width hero slide with large centered title, subtitle, and background accent.
    file: templates/hero-title.md
    tags: [hero, title, cover, intro, section-break]
    preview: previews/templates/hero-title.png
    max_elements: 3
    compatible_molecules: [mission-card, quote-card]
    compatible_aspect_ratios: ["16:9", "4:3"]

  - id: comparison-2col
    description: Two equal-width content columns for side-by-side comparisons.
    file: templates/comparison-2col.md
    tags: [comparison, two-column, versus, decision, split]
    preview: previews/templates/comparison-2col.png
    max_elements: 3
    compatible_molecules: [comparison-card, mission-card, kpi-card, quote-card, objective-card]
    compatible_aspect_ratios: ["16:9", "4:3"]

  - id: grid-3
    description: Adaptive 2-4 column card grid for parallel overview content.
    file: templates/grid-3.md
    tags: [grid, adaptive, cards, parallel, overview]
    preview: previews/templates/grid-3.png
    max_elements: 4
    compatible_molecules: [mission-card, stacked-text, kpi-card, profile-card, role-card, objective-card, location-card, contact-card, quote-card, daily-header-card, header-list-card]
    compatible_aspect_ratios: ["16:9", "4:3"]

  - id: numbered-list
    description: Vertical slide for 3-6 numbered steps with icons and short descriptions.
    file: templates/numbered-list.md
    tags: [list, numbered, steps, process, how-to, ranking]
    preview: previews/templates/numbered-list.png
    max_elements: 7
    compatible_molecules: [mission-card, objective-card, role-card]
    compatible_aspect_ratios: ["16:9", "4:3"]

  - id: data-insight
    description: Wide chart on the left, key insights and supporting KPIs on the right.
    file: templates/data-insight.md
    tags: [data, insight, analysis, chart, mixed, performance]
    preview: previews/templates/data-insight.png
    max_elements: 4
    compatible_molecules: [data-insight-panel, chart-card, kpi-card, trend-card, comparison-card, stats-chart-panel]
    compatible_aspect_ratios: ["16:9"]
