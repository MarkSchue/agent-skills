# Neutral Theme
# ─────────────────────────────────────────────────────────────────────────────
# This is the fallback theme used when no project design-config.yaml is present.
# All elements render correctly but without brand colors — suitable for previews.
# ─────────────────────────────────────────────────────────────────────────────

name: neutral
description: Greyscale fallback theme for previews and brand-agnostic output.

colors:
  primary:    "#1a1a1a"
  secondary:  "#555555"
  accent:     "#777777"
  neutral:    "#aaaaaa"
  surface:    "#ffffff"
  on-surface: "#1a1a1a"
  on-primary: "#ffffff"
  error:      "#cc0000"
  warning:    "#cc8800"
  success:    "#007700"

shapes:
  accent-line:    {stroke-color: "#1a1a1a", stroke-width: 4, dash-pattern: solid, opacity: 1.0}
  background-line:{stroke-color: "#ffffff", stroke-width: 1, dash-pattern: solid, opacity: 0.0}
  thin-line:      {stroke-color: "#aaaaaa", stroke-width: 1, dash-pattern: solid, opacity: 0.6}
  thick-line:     {stroke-color: "#1a1a1a", stroke-width: 3, dash-pattern: solid, opacity: 1.0}
  divider:        {stroke-color: "#aaaaaa", stroke-width: 1, dash-pattern: solid, opacity: 0.3}
  border-subtle:  {stroke-color: "#aaaaaa", stroke-width: 1, dash-pattern: solid, opacity: 0.5}
  border-strong:  {stroke-color: "#1a1a1a", stroke-width: 2, dash-pattern: solid, opacity: 1.0}

borders:
  radius-sharp:  0
  radius-medium: 4
  radius-large:  8

spacing:
  xs: 4
  s: 8
  m: 16
  l: 24
  xl: 48

typography:
  font-family: "IBM Plex Sans"
  heading-display: {size: 56, weight: 600, line-height: 1.1}
  heading:         {size: 32, weight: 600, line-height: 1.2}
  heading-sub:     {size: 24, weight: 400, line-height: 1.3}
  body:            {size: 16, weight: 400, line-height: 1.5}
  caption:         {size: 12, weight: 400, line-height: 1.4}

elevation:
  none:   {blur: 0,  distance: 0, opacity: 0}
  low:    {blur: 4,  distance: 2, angle: 90, opacity: 0.08}
  medium: {blur: 8,  distance: 4, angle: 90, opacity: 0.12}
  high:   {blur: 16, distance: 8, angle: 90, opacity: 0.16}
