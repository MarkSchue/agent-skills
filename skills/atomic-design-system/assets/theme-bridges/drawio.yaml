# Theme Bridge: draw.io
# ─────────────────────────────────────────────────────────────────────────────
# Translates agnostic design tokens to draw.io XML attribute names and values.
# Used by drawio_builder.py during Phase 6 (Assembly).
# An unknown token produces a WARNING — not a silent fallback.
# ─────────────────────────────────────────────────────────────────────────────

name: theme-bridge-drawio
platform: drawio
unit-system:
  length: px
  coordinate-origin: top-left

# ── Color mapping ─────────────────────────────────────────────────────────────
# Token → draw.io style attributes (fillColor, strokeColor, fontColor, etc.)
colors:
  primary:
    fillColor:   "{{colors.primary}}"
    strokeColor: "{{colors.primary}}"
    fontColor:   "{{colors.primary}}"
  secondary:
    fillColor:   "{{colors.secondary}}"
    strokeColor: "{{colors.secondary}}"
    fontColor:   "{{colors.secondary}}"
  accent:
    fillColor:   "{{colors.accent}}"
    strokeColor: "{{colors.accent}}"
    fontColor:   "{{colors.accent}}"
  neutral:
    fillColor:   "{{colors.neutral}}"
    strokeColor: "{{colors.neutral}}"
    fontColor:   "{{colors.neutral}}"
  surface:
    fillColor:   "{{colors.surface}}"
  on-surface:
    fontColor:   "{{colors.on-surface}}"
  on-primary:
    fontColor:   "{{colors.on-primary}}"
  error:
    fillColor:   "{{colors.error}}"
    fontColor:   "{{colors.error}}"
  warning:
    fillColor:   "{{colors.warning}}"
    fontColor:   "{{colors.warning}}"
  success:
    fillColor:   "{{colors.success}}"
    fontColor:   "{{colors.success}}"

# ── Shape token mapping ────────────────────────────────────────────────────────
shapes:
  accent-line:
    strokeColor: "{{shapes.accent-line.stroke-color}}"
    strokeWidth: "{{shapes.accent-line.stroke-width}}"
    dashed:      0
    opacity:     "{{shapes.accent-line.opacity * 100}}"
  thin-line:
    strokeColor: "{{shapes.thin-line.stroke-color}}"
    strokeWidth: "{{shapes.thin-line.stroke-width}}"
    dashed:      0
    opacity:     "{{shapes.thin-line.opacity * 100}}"
  thick-line:
    strokeColor: "{{shapes.thick-line.stroke-color}}"
    strokeWidth: "{{shapes.thick-line.stroke-width}}"
    dashed:      0
  divider:
    strokeColor: "{{shapes.divider.stroke-color}}"
    strokeWidth: "{{shapes.divider.stroke-width}}"
    dashed:      0
    opacity:     "{{shapes.divider.opacity * 100}}"
  border-subtle:
    strokeColor: "{{shapes.border-subtle.stroke-color}}"
    strokeWidth: "{{shapes.border-subtle.stroke-width}}"
    opacity:     "{{shapes.border-subtle.opacity * 100}}"
  border-strong:
    strokeColor: "{{shapes.border-strong.stroke-color}}"
    strokeWidth: "{{shapes.border-strong.stroke-width}}"

# ── Border radius mapping ────────────────────────────────────────────────────
borders:
  radius-sharp:
    rounded: 0
    arcSize: 0
  radius-medium:
    rounded: 1
    arcSize: "{{borders.radius-medium}}"        # draw.io uses arcSize for rounding
  radius-large:
    rounded: 1
    arcSize: "{{borders.radius-large}}"

# ── Elevation / shadow mapping ───────────────────────────────────────────────
# draw.io shadow is a boolean; blur/distance maps to shadow style string
elevation:
  none:
    shadow: 0
  low:
    shadow: 1
    # Note: draw.io does not expose fine-grained shadow controls via built-in style;
    # decompose into fillColor + offset shape if precise shadow needed
  medium:
    shadow: 1
  high:
    shadow: 1

# ── Spacing mapping ───────────────────────────────────────────────────────────
# Spacing tokens map directly to px values in draw.io geometry
spacing:
  xs:  "{{spacing.xs}}"
  s:   "{{spacing.s}}"
  m:   "{{spacing.m}}"
  l:   "{{spacing.l}}"
  xl:  "{{spacing.xl}}"

# ── Typography mapping ────────────────────────────────────────────────────────
typography:
  heading-display:
    fontSize:    "{{typography.heading-display.size}}"
    fontStyle:   "{{typography.heading-display.weight >= 600 ? 1 : 0}}"  # 0=normal,1=bold
    fontFamily:  "{{typography.font-family}}"
  heading:
    fontSize:    "{{typography.heading.size}}"
    fontStyle:   "{{typography.heading.weight >= 600 ? 1 : 0}}"
    fontFamily:  "{{typography.font-family}}"
  heading-sub:
    fontSize:    "{{typography.heading-sub.size}}"
    fontStyle:   0
    fontFamily:  "{{typography.font-family}}"
  body:
    fontSize:    "{{typography.body.size}}"
    fontStyle:   0
    fontFamily:  "{{typography.font-family}}"
  caption:
    fontSize:    "{{typography.caption.size}}"
    fontStyle:   0
    fontFamily:  "{{typography.font-family}}"

# ── Canvas mapping ─────────────────────────────────────────────────────────────
canvas:
  pageWidth:   "{{canvas.width}}"
  pageHeight:  "{{canvas.height}}"
  pageScale:   1
  background:  "{{colors.surface}}"
